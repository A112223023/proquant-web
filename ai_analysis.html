<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProQuant AI - AI分析</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 基礎設定與深色背景 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            color: #ffffff;
        }

        .app-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            background-color: #121212;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.05);
            overflow: hidden;
        }

        /* 頂部 Header */
        .header {
            padding: 15px 20px;
            background-color: #1e1e1e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .header-title {
            font-size: 18px;
            font-weight: bold;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title i { color: #38bdf8; }

        /* 主要內容區 */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 80px;
        }
        .content::-webkit-scrollbar { display: none; }

        /* 標題與標籤 */
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #a0a0a0;
            margin: 20px 0 10px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title.first { margin-top: 5px; }
        .section-badge {
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        /* 卡片共用 */
        .card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #2a2a2a;
        }

        /* A區：預測圖表控制列 */
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .stock-ticker {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        .time-filters {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .ai-search-input {
            width: 70px; padding: 6px; border-radius: 6px; border: 1px solid #333; 
            background: #000; color: white; text-align: center; outline: none;
        }
        .ai-search-input:focus { border-color: #38bdf8; }
        .filter-btn {
            background-color: #38bdf8;
            color: #000; font-weight: bold;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .chart-container { position: relative; height: 200px; width: 100%; }

        /* B區：精緻版 AI 選股評分 */
        .score-item {
            display: flex;
            flex-direction: column;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .score-item:last-child { border-bottom: none; padding-bottom: 0; }
        
        .score-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .stock-name { font-size: 16px; font-weight: bold; }
        .stock-code { font-size: 12px; color: #a0a0a0; margin-left: 5px; }
        .live-price { font-size: 13px; font-weight: bold; margin-left: 10px; color: #38bdf8; } 
        
        .score-value {
            font-size: 20px;
            font-weight: bold;
        }

        /* 分數進度條 */
        .progress-bg {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease-in-out, background 0.5s ease;
        }

        .score-footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #a0a0a0;
        }
        .sentiment-tag {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }

        /* C區：風險提示警報卡 */
        .warning-card {
            background: linear-gradient(to right, rgba(234, 179, 8, 0.1), transparent);
            border-left: 4px solid #eab308;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .warning-icon {
            color: #eab308;
            font-size: 24px;
            animation: pulse 2s infinite;
        }
        .warning-text h4 { margin: 0 0 5px 0; color: #eab308; font-size: 15px; }
        .warning-text p { margin: 0; font-size: 13px; color: #cbd5e1; line-height: 1.5; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* 底部導覽列 */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #1e1e1e;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #333;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #666;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-item.active { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        .nav-item i { font-size: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <div class="header-title"><i class="fas fa-microchip"></i> AI 深度分析引擎</div>
            <i class="fas fa-ellipsis-v" style="color: #a0a0a0;"></i>
        </div>

        <div class="content">
            
            <div class="section-title first"><div class="section-badge">A</div> AI 動態預測走勢</div>
            <div class="card">
                <div class="chart-header">
                    <div class="stock-ticker" id="chart-ticker-title">準備中...</div>
                    <div class="time-filters">
                        <input type="text" id="aiSearchTicker" class="ai-search-input" value="2382" placeholder="代碼">
                        <button class="filter-btn" onclick="loadMainPrediction()">AI 推演</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="predictionChart"></canvas>
                </div>
            </div>

            <div class="section-title"><div class="section-badge">B</div> AI 重點關注股評分</div>
            <div class="card" id="aiScoreContainer">
                <div style="text-align: center; color: #888; padding: 20px;">
                    <i class="fas fa-spinner fa-spin"></i> 正在呼叫後端 AI 模型批量運算...
                </div>
            </div>

            <div class="section-title"><div class="section-badge">C</div> AI 資金流向提示</div>
            <div class="warning-card">
                <i class="fas fa-exclamation-triangle warning-icon"></i>
                <div class="warning-text">
                    <h4>系統提醒：機器學習監控中</h4>
                    <p>目前所有的分析數據皆由後端 XGBoost 模型提供即時運算。投資決策請搭配您的風險承受度進行判斷。</p>
                </div>
            </div>

        </div>

        <div class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>看盤</span>
            </a>
            <a href="selection.html" class="nav-item">
                <i class="fas fa-search-dollar"></i>
                <span>選股</span>
            </a>
            <a href="ai_analysis.html" class="nav-item active">
                <i class="fas fa-microchip"></i>
                <span>AI分析</span>
            </a>
            <a href="community.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>社群</span>
            </a>
            <a href="education.html" class="nav-item">
                <i class="fas fa-book-open"></i>
                <span>教學</span>
            </a>
        </div>

    </div>

    <script>
        // 確保與後端 API 伺服器對齊
        const API_BASE_URL = "http://140.83.60.231:8000"; 
        let aiChartInstance = null;

        // ==========================================
        // 1. 動態繪製 AI 預測圖表 (融合真實數據與 AI 運算趨勢)
        // ==========================================
        async function loadMainPrediction() {
            const ticker = document.getElementById('aiSearchTicker').value || '2382';
            document.getElementById('chart-ticker-title').innerText = `分析 ${ticker}...`;

            try {
                // 並行抓取歷史股價 & AI預測結果
                const [stockRes, predRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/api/stock/${ticker}`),
                    fetch(`${API_BASE_URL}/api/prediction/${ticker}`)
                ]);

                if (!stockRes.ok) throw new Error("無股價資料");
                
                const stockData = (await stockRes.json()).data;
                const predData = await predRes.json();

                const stockName = stockData[stockData.length - 1].stock_name || ticker;
                document.getElementById('chart-ticker-title').innerText = `${stockName} (${ticker})`;

                // 準備繪圖資料
                const recentData = stockData.slice(-15);
                const realDates = recentData.map(d => d.trade_date.slice(5)); 
                const realPrices = recentData.map(d => d.close_price);
                const lastRealPrice = realPrices[realPrices.length - 1];

                // 💡 核心亮點：根據 AI 信心指數，動態計算未來 3 天的斜率！
                const confidence = predData.confidence;
                let dailyTrend = 1.0; 
                
                if (confidence >= 50) {
                    // 看漲：每天漲幅根據信心度遞增 (最高 +3%)
                    dailyTrend = 1.0 + ((confidence - 50) / 50) * 0.03;
                } else {
                    // 看跌：每天跌幅根據信心度遞增 (最高 -3%)
                    dailyTrend = 1.0 - ((50 - confidence) / 50) * 0.03;
                }

                const futureDates = ['D+1', 'D+2', 'D+3'];
                const futurePrices = [
                    lastRealPrice, 
                    lastRealPrice * dailyTrend, 
                    lastRealPrice * (dailyTrend ** 2), 
                    lastRealPrice * (dailyTrend ** 3)
                ];

                const allLabels = [...realDates, ...futureDates];
                const historyLineData = [...realPrices, null, null, null];
                const predictionLineData = Array(realPrices.length - 1).fill(null).concat(futurePrices);

                // 計算信賴區間
                const upperBoundData = predictionLineData.map(p => p !== null ? p * 1.05 : null);
                const lowerBoundData = predictionLineData.map(p => p !== null ? p * 0.95 : null);

                // 動態 Y 軸
                const allVisiblePrices = [...realPrices, ...futurePrices];
                const minY = Math.min(...allVisiblePrices) * 0.9;
                const maxY = Math.max(...allVisiblePrices) * 1.15;

                renderChart(allLabels, historyLineData, predictionLineData, upperBoundData, lowerBoundData, minY, maxY, confidence >= 50);

            } catch (error) {
                console.error("圖表載入失敗:", error);
                document.getElementById('chart-ticker-title').innerText = "發生錯誤";
            }
        }

        function renderChart(labels, hist, pred, upper, lower, minY, maxY, isBullish) {
            const ctx = document.getElementById('predictionChart').getContext('2d');
            
            // 根據多空設定區間顏色 (紅漲綠跌)
            const mainColor = isBullish ? '#ef4444' : '#22c55e';
            const gradientFill = ctx.createLinearGradient(0, 0, 0, 200);
            gradientFill.addColorStop(0, isBullish ? 'rgba(239, 68, 68, 0.3)' : 'rgba(34, 197, 94, 0.3)');
            gradientFill.addColorStop(1, 'rgba(0, 0, 0, 0.0)');

            if (aiChartInstance) aiChartInstance.destroy();

            aiChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Upper', data: upper, borderColor: 'transparent', pointRadius: 0, fill: false },
                        { label: 'Lower', data: lower, borderColor: 'transparent', backgroundColor: gradientFill, pointRadius: 0, fill: '-1' },
                        { label: '歷史', data: hist, borderColor: '#e2e8f0', borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false },
                        { 
                            label: '預測', data: pred, 
                            borderColor: mainColor, borderWidth: 2, borderDash: [5, 5], tension: 0.3,
                            pointBackgroundColor: mainColor,
                            pointRadius: (ctx) => ctx.dataIndex === labels.length - 1 ? 5 : 0, 
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#333', drawBorder: false }, ticks: { color: '#a0a0a0', font: { size: 10 } } },
                        y: { grid: { color: '#333', drawBorder: false }, ticks: { color: '#a0a0a0', font: { size: 10 } }, min: minY, max: maxY }
                    }
                }
            });
        }

        // ==========================================
        // 2. 自動批量載入 AI 關注股評分列表
        // ==========================================
        const aiWatchlist = ['2330', '2382', '2454']; // 要監控的個股代碼

        async function loadAllAIScores() {
            const container = document.getElementById('aiScoreContainer');
            container.innerHTML = '';

            for (const ticker of aiWatchlist) {
                // 1. 產生骨架
                const htmlStr = `
                <div class="score-item">
                    <div class="score-header">
                        <div>
                            <span class="stock-name" id="score-name-${ticker}">載入中</span><span class="stock-code">${ticker}</span>
                            <span class="live-price" id="score-price-${ticker}">--</span>
                        </div>
                        <div class="score-value" id="score-val-${ticker}">
                            <i class="fas fa-spinner fa-spin" style="font-size: 14px;"></i>
                        </div>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-fill" id="score-bar-${ticker}" style="width: 0%; background: #333;"></div>
                    </div>
                    <div class="score-footer">
                        <span id="score-reason-${ticker}">分析中...</span>
                        <span class="sentiment-tag" id="score-tag-${ticker}">-</span>
                    </div>
                </div>`;
                container.innerHTML += htmlStr;
                
                // 2. 異步派發任務去後端要資料
                fetchSingleScore(ticker);
            }
        }

        async function fetchSingleScore(ticker) {
            try {
                const [stockRes, predRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/api/stock/${ticker}`),
                    fetch(`${API_BASE_URL}/api/prediction/${ticker}`)
                ]);

                const stockData = (await stockRes.json()).data;
                const predData = await predRes.json();

                // 填入股價與名稱
                const lastPrice = stockData[stockData.length - 1].close_price;
                document.getElementById(`score-name-${ticker}`).innerText = stockData[stockData.length - 1].stock_name || ticker;
                document.getElementById(`score-price-${ticker}`).innerText = `$${lastPrice.toFixed(2)}`;
                
                // 填入 AI 分數與進度條
                const conf = predData.confidence;
                const valEl = document.getElementById(`score-val-${ticker}`);
                const barEl = document.getElementById(`score-bar-${ticker}`);
                const tagEl = document.getElementById(`score-tag-${ticker}`);

                valEl.innerText = `${conf}%`;
                barEl.style.width = `${conf}%`;
                document.getElementById(`score-reason-${ticker}`).innerHTML = `<i class="fas fa-bolt"></i> 理由：${predData.message}`;

                // 動態決定台股顏色 (高分紅、低分綠)
                if(conf >= 55) {
                    valEl.style.color = "#ef4444";
                    barEl.style.background = "linear-gradient(90deg, #ef4444, #f87171)";
                    tagEl.innerText = "偏多";
                    tagEl.style.color = "#ef4444";
                    tagEl.style.background = "rgba(239, 68, 68, 0.1)";
                } else if (conf <= 45) {
                    valEl.style.color = "#22c55e";
                    barEl.style.background = "linear-gradient(90deg, #22c55e, #4ade80)";
                    tagEl.innerText = "偏空";
                    tagEl.style.color = "#22c55e";
                    tagEl.style.background = "rgba(34, 197, 94, 0.1)";
                } else {
                    valEl.style.color = "#eab308";
                    barEl.style.background = "linear-gradient(90deg, #eab308, #fde047)";
                    tagEl.innerText = "震盪";
                    tagEl.style.color = "#eab308";
                    tagEl.style.background = "rgba(234, 179, 8, 0.1)";
                }

            } catch (error) {
                console.error(`解析 ${ticker} 發生錯誤`, error);
                document.getElementById(`score-val-${ticker}`).innerText = "失敗";
            }
        }

        // ==========================================
        // 3. 頁面載入時執行
        // ==========================================
        window.onload = () => {
            loadMainPrediction();  // 載入A區的大圖表
            loadAllAIScores();     // 批量載入B區的選股評分
        };
    </script>
</body>
</html>
